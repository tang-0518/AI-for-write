[pytest]
testpaths = tests
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --strict-markers --import-mode=importlib
markers =
    unit: unit tests
    integration: integration tests
    slow: slow tests
    asyncio: asyncio tests
consider_namespace_packages = true
asyncio_mode = auto
